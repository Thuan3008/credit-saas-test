version: "3.9"

services:
  db:
    image: postgres:15
    container_name: credit_saas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credit_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: credit_saas_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/credit_saas
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data: